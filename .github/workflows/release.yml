name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: '.exe' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BIN_NAME="merged-free-models${{ matrix.ext }}"
          PKG_NAME="merged-free-models-${VERSION}-${GOOS}-${GOARCH}"

          go build -trimpath \
            -ldflags="-s -w \
              -X github.com/denniszlei/merged-free-models/internal/version.Version=${VERSION} \
              -X github.com/denniszlei/merged-free-models/internal/version.Commit=${COMMIT} \
              -X github.com/denniszlei/merged-free-models/internal/version.Date=${DATE}" \
            -o "${BIN_NAME}" ./cmd/server

          if [ "${GOOS}" = "windows" ]; then
            zip "dist/${PKG_NAME}.zip" "${BIN_NAME}" LICENSE README.md .env.example
          else
            tar -czf "dist/${PKG_NAME}.tar.gz" "${BIN_NAME}" LICENSE README.md .env.example
          fi
          rm -f "${BIN_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true
      - name: Compute checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta.outputs.created }}
